<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T|H|A Premium Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #051430; margin: 0; overflow: hidden; }
        
        /* 🚀 Nuclear Option: สั่งตายกรอบขาวดั้งเดิมถาวร ทุกชั้น! */
        #reader__scan_region svg, 
        #reader__viewfinder_border,
        #reader__scan_region > div:nth-child(2) { display: none !important; border: none !important; outline: none !important; }
        #reader { border: none !important; outline: none !important; }

        /* 🌟 สร้างกรอบสแกนสมูท (200x200) ตามสั่ง พร้อม Breathing Effect */
        .scan-frame {
            width: 200px; height: 200px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            position: relative;
            animation: breath 2.5s infinite ease-in-out;
        }
        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .corner { position: absolute; width: 20px; height: 20px; border-color: #00e5ff; filter: drop-shadow(0 0 5px #00e5ff); }
        .t-l { top: -1px; left: -1px; border-top: 4px solid; border-left: 4px solid; border-radius: 8px 0 0 0; }
        .t-r { top: -1px; right: -1px; border-top: 4px solid; border-right: 4px solid; border-radius: 0 8px 0 0; }
        .b-l { bottom: -1px; left: -1px; border-bottom: 4px solid; border-left: 4px solid; border-radius: 0 0 0 8px; }
        .b-r { bottom: -1px; right: -1px; border-bottom: 4px solid; border-right: 4px solid; border-radius: 0 0 8px 0; }

        .laser { width: 100%; height: 2px; background: #00e5ff; position: absolute; animation: laser 2s infinite linear; box-shadow: 0 0 10px #00e5ff; }
        @keyframes laser { 0% { top: 0; } 100% { top: 100%; } }

        /* ✨ หน้าจอ Freeze & Success Overlay (สีขาวโปร่งแสง) */
        #freeze-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .success-card { background: white; padding: 2.5rem; border-radius: 2rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transform: scale(0.5); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border: 2px solid rgba(0,229,255,0.2); }
        @keyframes pop { 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-screen text-white">

    <div class="bg-[#051430] p-4 text-center z-20 flex justify-between items-center border-b border-[#00e5ff]/20">
        <div class="w-8"></div>
        <h1 class="text-lg font-bold tracking-widest text-[#00e5ff]">T | H | A <span class="text-[10px] block font-normal text-white opacity-70">Premium Scanner</span></h1>
        <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center bg-white/10 hover:bg-white/20 transition-colors rounded-full">✕</button>
    </div>

    <div class="flex-grow relative flex items-center justify-center bg-black">
        <div id="reader" class="w-full h-full object-cover"></div>
        
        <div id="ui-layer" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity duration-300">
            <div class="scan-frame">
                <div class="corner t-l"></div><div class="corner t-r"></div>
                <div class="corner b-l"></div><div class="corner b-r"></div>
                <div class="laser"></div>

                <div class="absolute right-2 bottom-2 pointer-events-auto">
                    <label class="w-10 h-10 bg-gradient-to-br from-white to-gray-100 text-[#051430] rounded-xl shadow-[4px_4px_10px_rgba(0,0,0,0.3)] hover:scale-105 transition-all flex items-center justify-center group active:scale-95 border border-white cursor-pointer" title="ดึงรูปภาพ QR จากอัลบั้ม">
                        <div class="relative w-6 h-6 flex items-center justify-center">
                        <svg class="w-full h-full text-[#051430]/70 group-hover:text-[#00e5ff] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        </div>
                        <input type="file" id="qr-upload" class="hidden" accept="image/*" onchange="scanQRFromFile(event)">
                    </label>
                </div>
            </div>
        </div>

        <div id="freeze-overlay">
            <div class="success-card">
                <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-gray-800 text-xl font-bold">สแกนสำเร็จ</h2>
                <p id="res-id" class="text-blue-600 font-bold mt-2 text-lg"></p>
                <p class="text-gray-400 text-xs mt-3 animate-pulse">กำลังกลับเข้าหน้าแอป...</p>
            </div>
        </div>
    </div>

    <div class="bg-[#051430] p-6 text-center z-20 border-t border-[#00e5ff]/20">
        <p class="text-gray-400 text-xs tracking-widest uppercase">T | H | A Asset Management v2.0</p>
    </div>

    <script>
        const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        const SECRET_KEY = "N1u3@THA-SAM_K07e03y2026";
        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: { width: 200, height: 200 } },
                (decodedText) => { handleScan(decodedText); }
            ).catch(err => console.error(err));
        }

        function handleScan(text) {
            // 🛑 1. หยุดกล้องทันที (Freeze)
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error(err));
            }

            // 🛑 2. Data Stripper: กรองรหัส ตัดลิงก์ยาวทิ้ง
            let cleanId = text;
            if (text.includes('id=')) {
                try {
                    const match = text.match(/[?&]id=([^&]+)/);
                    cleanId = match ? decodeURIComponent(match[1]) : text;
                } catch(e) { cleanId = text; }
            }

            // 🛑 3. แสดงหน้าจอ Success และค้างไว้ 3 วินาที
            beep.play().catch(e=>e);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            document.getElementById('res-id').innerText = cleanId;
            document.getElementById('freeze-overlay').style.display = 'flex';
            document.getElementById('ui-layer').style.opacity = '0';

            // 🛑 4. ส่งรหัสสั้นกลับไป และปิดแท็บ
            setTimeout(() => {
                if (window.opener) {
                    window.opener.postMessage({ type: 'QR_SCANNED', id: cleanId, key: SECRET_KEY }, "*");
                    window.close();
                }
            }, 3000); 
        }

        async function scanQRFromFile(event) {
            if (event.target.files.length === 0) return;
            const file = event.target.files[0];
            const readerInstance = new Html5Qrcode("reader");
            try {
                const result = await readerInstance.scanFile(file, true);
                handleScan(result);
            } catch (err) { alert("ไม่พบ QR Code ในรูปภาพครับ กรุณาลองใหม่"); }
        }

        function goBack() { if (window.opener) window.close(); else history.back(); }
        window.onload = startScanner;
    </script>
</body>
</html>
