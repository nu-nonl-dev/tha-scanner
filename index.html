<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T|H|A Premium Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #051430; margin: 0; overflow: hidden; }
        
        /* 🚀 ปิดกรอบดั้งเดิมของไลบรารี */
        #reader__scan_region svg, 
        #reader__viewfinder_border,
        #reader__scan_region > div:nth-child(2) { display: none !important; }
        #reader { border: none !important; outline: none !important; }
        #reader__scan_region { position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; }
        #reader video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }

        /* 🌟 Holographic Masking Overlay (อัปเดต: ให้เรียงตัวแนวตั้ง) */
        .hologram-mask {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.5rem; /* ระยะห่างระหว่างกรอบกับป้ายข้อความ */
            padding-bottom: 4rem; /* ดันกรอบและข้อความขึ้นไปให้อยู่ศูนย์กลางสายตา */
        }

        /* 🌟 เจาะรูใสกระจกแจ๋ว */
        .scan-window {
            width: 260px; height: 260px; position: relative;
            box-shadow: 0 0 0 9999px rgba(5, 20, 48, 0.75); 
            border-radius: 16px; 
        }

        /* 🌟 Smart Scanner Frame */
        .scan-frame-ui {
            position: absolute; inset: -8px; border-radius: 20px;
            animation: simulated-track 1.2s infinite cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes simulated-track {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 3px #00e5ff); }
            50% { transform: scale(1.06); opacity: 1; filter: drop-shadow(0 0 12px #00e5ff); } 
        }

        .corner { position: absolute; width: 35px; height: 35px; border-color: #00e5ff; }
        .t-l { top: 0; left: 0; border-top: 5px solid; border-left: 5px solid; border-radius: 16px 0 0 0; }
        .t-r { top: 0; right: 0; border-top: 5px solid; border-right: 5px solid; border-radius: 0 16px 0 0; }
        .b-l { bottom: 0; left: 0; border-bottom: 5px solid; border-left: 5px solid; border-radius: 0 0 0 16px; }
        .b-r { bottom: 0; right: 0; border-bottom: 5px solid; border-right: 5px solid; border-radius: 0 0 16px 0; }

        /* 🌟 Holographic Scan Line */
        .laser-wrapper { position: absolute; inset: 0; border-radius: 16px; overflow: hidden; }
        .laser { 
            width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #00e5ff, transparent);
            position: absolute; box-shadow: 0 0 15px 3px rgba(0, 229, 255, 0.7); 
            animation: laser-scan 2s infinite linear; 
        }
        @keyframes laser-scan { 0% { top: -10%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 110%; opacity: 0; } }

        /* ✨ หน้าจอ Freeze & Success Overlay */
        #freeze-overlay {
            position: absolute; inset: 0; background: rgba(5, 20, 48, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .success-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 3rem; border-radius: 2rem; text-align: center; 
            box-shadow: 0 20px 40px rgba(0, 229, 255, 0.2); border: 1px solid rgba(0, 229, 255, 0.3);
            transform: scale(0.5); opacity: 0;
            animation: holo-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        @keyframes holo-pop { 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen text-white relative">

    <div class="absolute top-0 w-full bg-gradient-to-b from-[#051430]/95 via-[#051430]/80 to-transparent p-4 pt-6 pb-10 z-20 flex flex-col pointer-events-none">
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="w-10"></div>
            <div class="text-center">
                <h1 class="text-lg font-bold tracking-widest text-[#00e5ff] drop-shadow-md">T | H | A</h1>
                <span class="text-[10px] font-medium text-white/70 tracking-widest uppercase block mt-0.5">Smart Scanner</span>
            </div>
            <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-[#00e5ff]/20 text-white hover:text-[#00e5ff] transition-all rounded-full backdrop-blur-md border border-white/20 shadow-lg active:scale-90">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="text-center mt-6">
            <h2 class="text-3xl font-extrabold text-white tracking-widest drop-shadow-[0_2px_10px_rgba(0,229,255,0.4)]">SCAN QR CODE</h2>
        </div>
    </div>

    <div id="reader-container" class="absolute inset-0 bg-black z-0 overflow-hidden">
        <div id="reader" class="w-full h-full"></div>
    </div>
    
    <div id="ui-layer" class="hologram-mask transition-opacity duration-300">
        <div class="scan-window">
            <div class="scan-frame-ui">
                <div class="corner t-l"></div><div class="corner t-r"></div>
                <div class="corner b-l"></div><div class="corner b-r"></div>
            </div>
            <div class="laser-wrapper"><div class="laser"></div></div>
        </div>
        
        <p class="text-white/90 text-sm font-medium tracking-wide drop-shadow-md bg-[#051430]/60 backdrop-blur-md px-6 py-2.5 rounded-full border border-white/20 pointer-events-none mt-2">
            จัดคิวอาร์โค้ดให้อยู่ในกรอบเพื่อสแกน
        </p>
    </div>

    <div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-[#051430]/90 to-transparent z-10 pointer-events-none"></div>

    <div class="absolute right-6 bottom-24 z-30 flex flex-col gap-5 pointer-events-auto">
        
        <label class="w-14 h-14 bg-white/10 hover:bg-[#00e5ff]/20 text-white hover:text-[#00e5ff] rounded-full shadow-[0_0_15px_rgba(0,229,255,0.15)] backdrop-blur-md transition-all flex items-center justify-center group active:scale-95 border border-white/20 cursor-pointer" title="สแกนจากรูปภาพ">
            <svg class="w-6 h-6 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <input type="file" id="qr-upload" class="hidden" accept="image/*" onchange="scanQRFromFile(event)">
        </label>

        <button onclick="refreshCamera()" class="w-14 h-14 bg-white/10 hover:bg-[#00e5ff]/20 text-white hover:text-[#00e5ff] rounded-full shadow-[0_0_15px_rgba(0,0,0,0.3)] backdrop-blur-md transition-all flex items-center justify-center group active:scale-90 border border-white/20" title="รีเฟรชโฟกัสกล้อง">
            <svg class="w-6 h-6 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
        </button>
        
    </div>

    <div id="freeze-overlay">
        <div class="success-card">
            <div class="relative w-20 h-20 mx-auto mb-6">
                <div class="absolute inset-0 border-4 border-[#00e5ff]/30 rounded-full animate-ping"></div>
                <div class="absolute inset-0 bg-gradient-to-br from-[#00e5ff] to-blue-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(0,229,255,0.6)]">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
            </div>
            <h2 class="text-[#00e5ff] text-2xl font-bold tracking-wide">สแกนสำเร็จ</h2>
            <p id="res-id" class="text-white font-bold mt-3 text-xl bg-white/10 py-2 px-6 rounded-lg inline-block border border-white/20 tracking-wider"></p>
            <p class="text-[#00e5ff]/70 text-sm mt-5 font-medium flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-[#00e5ff] rounded-full animate-pulse"></span>
                กำลังประมวลผลข้อมูล...
            </p>
        </div>
    </div>

    <script>
        const beep = new Audio('https://actions.google.com/sounds/v1/ui/beep_short_active.ogg');
        beep.volume = 0.5;
        const SECRET_KEY = "N1u3@THA-SAM_K07e03y2026";
        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20 },
                (decodedText) => { handleScan(decodedText); }
            ).then(() => {
                if (navigator.vibrate) navigator.vibrate(50);
            }).catch(err => {
                console.error("Camera Init Error:", err);
                alert("ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบสิทธิ์การเข้าถึง");
            });
        }

        // 🌟 ฟังก์ชันรีเฟรช/รีสตาร์ทกล้อง
        function refreshCamera() {
            if (navigator.vibrate) navigator.vibrate([30, 30]); // สั่น 2 จังหวะสั้นๆ
            
            const btn = document.querySelector('button[onclick="refreshCamera()"] svg');
            btn.classList.add('animate-spin'); // ใส่เอฟเฟกต์หมุนให้ปุ่ม
            
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    setTimeout(() => {
                        startScanner();
                        btn.classList.remove('animate-spin');
                    }, 300); // พักเสี้ยววิแล้วเปิดใหม่
                }).catch(err => {
                    console.error("Error stopping camera", err);
                    btn.classList.remove('animate-spin');
                });
            } else {
                startScanner();
                btn.classList.remove('animate-spin');
            }
        }

        function handleScan(text) {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error(err));
            }

            let cleanId = text;
            if (text.includes('id=')) {
                try {
                    const match = text.match(/[?&]id=([^&]+)/);
                    cleanId = match ? decodeURIComponent(match[1]) : text;
                } catch(e) { cleanId = text; }
            }

            beep.play().catch(e=>e);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            
            document.getElementById('res-id').innerText = cleanId;
            document.getElementById('freeze-overlay').style.display = 'flex';
            document.getElementById('ui-layer').style.opacity = '0'; 

            setTimeout(() => {
                if (window.opener) {
                    window.opener.postMessage({ type: 'QR_SCANNED', id: cleanId, key: SECRET_KEY }, "*");
                    window.close();
                } else {
                    alert("สแกนได้รหัส: " + cleanId + "\n(เปิดผ่าน LIFF หรือ PWA ให้ปิดหน้านี้เอง)");
                }
            }, 2500); 
        }

        async function scanQRFromFile(event) {
            if (event.target.files.length === 0) return;
            const file = event.target.files[0];
            const readerInstance = new Html5Qrcode("reader");
            try {
                if (navigator.vibrate) navigator.vibrate(30); 
                const result = await readerInstance.scanFile(file, true);
                handleScan(result);
            } catch (err) { 
                alert("ไม่พบ QR Code ในรูปภาพ กรุณาลองรูปอื่นครับ"); 
            }
        }

        function goBack() { 
            if (window.opener) window.close(); 
            else history.back(); 
        }
        
        window.onload = startScanner;
    </script>
</body>
</html>
