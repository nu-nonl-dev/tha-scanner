<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T|H|A Asset Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #051430; margin: 0; padding: 0; overflow: hidden; }
        
        /* 🚀 ท่าไม้ตาย: สั่งตายขอบขาวและ UI ดั้งเดิมของ Library ทั้งหมด */
        #reader__scan_region svg, #reader__viewfinder_border { display: none !important; }
        #reader { border: none !important; }

        /* 🌟 สร้างกรอบนีออนสมูทเอง (200x200) */
        .neon-box {
            width: 200px; height: 200px;
            border: 2px solid rgba(0, 229, 255, 0.5);
            position: relative;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            animation: subtle-pulse 2.5s infinite alternate ease-in-out;
        }
        /* มุมกรอบแบบสมูท */
        .corner {
            position: absolute; width: 20px; height: 20px;
            border-color: #00e5ff; filter: drop-shadow(0 0 5px #00e5ff);
        }
        .top-l { top: -2px; left: -2px; border-top: 4px solid; border-left: 4px solid; border-radius: 4px 0 0 0; }
        .top-r { top: -2px; right: -2px; border-top: 4px solid; border-right: 4px solid; border-radius: 0 4px 0 0; }
        .bot-l { bottom: -2px; left: -2px; border-bottom: 4px solid; border-left: 4px solid; border-radius: 0 0 0 4px; }
        .bot-r { bottom: -2px; right: -2px; border-bottom: 4px solid; border-right: 4px solid; border-radius: 0 0 4px 0; }

        @keyframes subtle-pulse {
            0% { opacity: 0.4; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        .scan-line {
            width: 100%; height: 2px; background: #00e5ff;
            position: absolute; top: 0; left: 0;
            box-shadow: 0 0 10px #00e5ff;
            animation: scan-move 3s infinite linear;
        }
        @keyframes scan-move { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex flex-col h-screen text-white">

    <div class="bg-[#051430] p-4 text-center shadow-lg z-20 flex justify-between items-center border-b border-[#00e5ff]/20">
        <div class="w-8"></div>
        <h1 class="text-xl font-bold tracking-widest text-[#00e5ff]">T | H | A <span class="text-white text-xs block font-normal">Smart Scanner</span></h1>
        <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center bg-white/10 rounded-full">✕</button>
    </div>

    <div class="flex-grow relative flex items-center justify-center bg-black">
        <div id="reader" class="w-full h-full"></div>
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="neon-box">
                <div class="corner top-l"></div><div class="corner top-r"></div>
                <div class="corner bot-l"></div><div class="corner bot-r"></div>
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="bg-[#06245C] p-6 text-center z-20 rounded-t-3xl border-t border-[#00e5ff]/20">
        <label class="w-full bg-[#00e5ff]/10 text-[#00e5ff] border-2 border-[#00e5ff] border-dashed rounded-xl p-4 text-center font-bold cursor-pointer flex items-center justify-center gap-3 active:scale-95 transition-transform">
          <span class="text-2xl">🖼️</span>
          <span id="label-text">เลือกรูปภาพ QR / ถ่ายรูป</span>
          <input type="file" id="qr-upload" class="hidden" accept="image/*" onchange="scanQRFromFile(event)">
        </label>
        <div class="text-[10px] text-gray-500 mt-4" id="debug-info">READY TO SCAN</div>
    </div>

    <script>
        const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        const SECRET_KEY = "N1u3@THA-SAM_K07e03y2026";
        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: 200 }, // เน้นความเร็ว
                (decodedText) => { handleData(decodedText); }
            ).catch(err => console.error(err));
        }

        function handleData(decodedText) {
            beep.play().catch(e=>e);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            let id = decodedText;
            if(decodedText.includes('id=')) {
                try { id = new URL(decodedText).searchParams.get('id'); } catch(e){}
            }

            if (window.opener) {
                window.opener.postMessage({ type: 'QR_SCANNED', id: id, key: SECRET_KEY }, "*");
                document.getElementById('debug-info').innerText = "SUCCESS: " + id;
                setTimeout(() => window.close(), 1000);
            }
        }

        // 🌟 แก้ไข: เร่งความเร็วอ่านไฟล์โดยการสร้าง Instance ใหม่ถ้าจำเป็น
        async function scanQRFromFile(event) {
            if (event.target.files.length === 0) return;
            document.getElementById('label-text').innerText = "กำลังอ่านไฟล์...";
            
            const file = event.target.files[0];
            const readerInstance = new Html5Qrcode("reader"); // ใช้ Instance แยกเพื่อความเร็ว
            
            try {
                const result = await readerInstance.scanFile(file, true);
                handleData(result);
            } catch (err) {
                alert("ไม่พบ QR Code หรือรูปไม่ชัด กรุณาลองใหม่ครับ");
                document.getElementById('label-text').innerText = "เลือกรูปภาพ QR / ถ่ายรูป";
            }
        }

        function goBack() { if (window.opener) window.close(); else history.back(); }
        window.onload = startScanner;
    </script>
</body>
</html>
