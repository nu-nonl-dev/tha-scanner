<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T|H|A Asset Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #051430; margin: 0; padding: 0; }
        
        /* 🌟 ปรับปรุง: กรอบสแกนสมูทแบบพรีเมียม (เล็กลง, ลบไซไฟ) */
        
        /* 🚀 ท่าไม้ตาย 1: ซ่อน viewBox และ Path ดั้งเดิมของ Library ทิ้งทั้งหมด (ลบขอบขาว!) */
        #reader__scan_region svg path { display: none !important; }
        #reader__scan_region svg { border: none !important; outline: none !important; }
        
        /* 🚀 ท่าไม้ตาย 2: ปรับแต่งกรอบ Viewfinder ของ Library โดยตรงให้ดูสมูท */
        #reader__viewfinder_border {
            border-color: #00e5ff !important; /* นีออนบางๆ */
            filter: drop-shadow(0 0 3px #00e5ff) !important;
            /* 🚀 กระพริบช้าๆ สมูทแบบลึกล้ำ */
            animation: subtle-pulse 2.5s infinite alternate !important; 
        }
        
        @keyframes subtle-pulse {
            0% { opacity: 1; filter: drop-shadow(0 0 8px #00e5ff); }
            100% { opacity: 0.5; filter: drop-shadow(0 0 2px #00e5ff); }
        }

        #reader { border: none !important; outline: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-white">

    <div class="bg-[#051430] p-4 text-center shadow-[0_4px_15px_rgba(0,229,255,0.2)] z-20 flex justify-between items-center relative border-b border-[#00e5ff]/30">
        <div class="w-8"></div>
        <h1 class="text-xl font-bold tracking-widest text-[#00e5ff] drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">T | H | A <span class="text-white text-sm font-normal block tracking-normal drop-shadow-none">Smart Scanner</span></h1>
        <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center bg-[#00e5ff]/10 text-[#00e5ff] rounded-full hover:bg-[#00e5ff]/30 border border-[#00e5ff]/50 transition-all transition-transform active:scale-95">✕</button>
    </div>

    <div class="flex-grow relative flex items-center justify-center bg-black">
        <div id="reader" class="w-full h-full object-cover"></div>
    </div>

    <div class="bg-[#06245C] p-6 text-center z-20 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.3)] border-t border-[#00e5ff]/20">
        <p class="text-gray-300 text-sm mb-4">หันกล้องไปที่ป้าย QR Code หรือกดปุ่มด้านล่างเพื่อเลือกรูป</p>
        
        <label id="upload-label" class="w-full bg-[#00e5ff]/10 text-[#00e5ff] border-2 border-[#00e5ff] border-dashed rounded-xl p-4 text-center font-bold cursor-pointer hover:bg-[#00e5ff]/20 hover:scale-[1.02] transition-all shadow-[0_0_10px_rgba(0,229,255,0.3)] flex items-center justify-center gap-3 active:scale-95">
          <span class="text-3xl">🖼️</span>
          <span id="upload-label-text">เลือกรูปภาพ QR / ถ่ายรูป</span>
          <input type="file" id="qr-upload" class="hidden" accept="image/*" onchange="scanQRFromFile(event)">
        </label>
        
        <div class="text-xs text-gray-500 font-mono mt-4" id="debug-info">รอการสแกน...</div>
    </div>

    <script>
        const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        const SECRET_KEY = "N1u3@THA-SAM_K07e03y2026"; // ⚠️ รหัสลับตัวจริง

        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { 
                    fps: 15, 
                    // 🚀 ลดขนาดกรอบสแกนลงเป็น 200x200 (เล็กและสมูท ไม่เต็มจอ)
                    qrbox: { width: 200, height: 200 } 
                },
                (decodedText) => { handleScannedData(decodedText, false); },
                (err) => { /* Ignore focus errors */ }
            ).catch(err => {
                document.getElementById('debug-info').innerText = "ข้อผิดพลาดกล้อง: " + err;
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง");
            });
        }

        // 🌟 Unified Handler จัดการข้อมูลสแกน
        function handleScannedData(decodedText, isFromFile) {
            // เสียง + สั่น
            beep.pause(); beep.currentTime = 0; beep.play().catch(e=>e);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // ปิดกล้องทันที
            if (html5QrCode && html5QrCode.isScanning) {
              html5QrCode.stop().catch(() => {});
            }

            let scannedId = decodedText;
            if(decodedText.includes('id=')) {
                try { scannedId = new URL(decodedText).searchParams.get('id'); } catch(e){}
            }

            // 🚀 ท่าไม้ตาย (ส่งกระแสจิต): ส่งข้อมูลพร้อม ⚠️ SECRET_KEY!
            if (window.opener) {
                window.opener.postMessage({ 
                    type: 'QR_SCANNED', 
                    id: scannedId,
                    key: SECRET_KEY // แนบรหัสลับไปด้วย
                }, "*");
                
                // เปลี่ยนหน้าจอเป็นแจ้งเตือนนีออน
                document.getElementById('debug-info').innerHTML = `
                    <div class="text-[#00e5ff] text-xl font-bold mb-2">✅ ${isFromFile ? 'อ่านไฟล์' : 'สแกน'}สำเร็จ!</div>
                    <p class="text-white text-lg">รหัส: ${scannedId}</p>
                    <p class="text-[#D4AF37] text-sm mt-4 animate-pulse">กำลังกลับไปที่หน้าแอป...</p>
                `;
                
                // สั่งปิดแท็บทิ้งเพื่อดีดกลับแอปหลัก
                setTimeout(() => { window.close(); }, 1500); 
            } else {
                // กรณีไม่ได้เปิดจากแอป
                document.getElementById('debug-info').innerText = `✅สำเร็จ!\nรหัส: ${scannedId}\n(กลับไปหน้าแอปเพื่อพิมพ์รหัสเอง)`;
            }
        }

        // 🌟 แก้ไข BUG: ฟังก์ชันแนบไฟล์รูปภาพ QR Code ที่สมบูรณ์แบบ
        function scanQRFromFile(event) {
          if (event.target.files.length == 0) return;
          const imageFile = event.target.files[0];
          const uploadLabelText = document.getElementById('upload-label-text');
          
          // เปลี่ยนข้อความสถานะ (แก้ BUG ID)
          uploadLabelText.innerText = "กำลังอ่านไฟล์...";

          // จัดการ Instance ของ Library
          if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
          
          // สั่งสแกนจากไฟล์
          html5QrCode.scanFile(imageFile, true)
            .then(decodedText => { 
                uploadLabelText.innerText = "อ่านรูปสำเร็จ!";
                handleScannedData(decodedText, true); 
            })
            .catch(err => {
              beep.play().catch(e=>e); // เสียงเตือนว่าอ่านไม่เจอ
              alert("อ่าน QR Code ไม่สำเร็จ: ไม่พบรหัสในรูปภาพ หรือรูปภาพไม่ชัด กรุณาลองใหม่ครับ");
              document.getElementById('debug-info').innerText = "อ่านรูปไม่สำเร็จ: ไม่พบ QR";
              uploadLabelText.innerText = "🖼️ เลือกรูปภาพ QR / ถ่ายรูป";
            });
          
          event.target.value = ''; // เคลียร์ Input เผื่อเลือกรูปเดิมซ้ำ
        }

        // ปุ่ม X ด้านบนขวา สำหรับปิดแท็บ
        function goBack() {
            if (window.opener) { window.close(); } else { window.history.back(); }
        }

        window.onload = startScanner;
    </script>
</body>
</html>
