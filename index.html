<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T|H|A Asset Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #051430; margin: 0; padding: 0; }
        .scan-line { width: 100%; height: 2px; background: #00ff00; position: absolute; top: 0; left: 0; box-shadow: 0 0 10px #00ff00; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-white">

    <div class="bg-[#06245C] p-4 text-center shadow-lg z-20 flex justify-between items-center relative">
        <div class="w-8"></div>
        <h1 class="text-xl font-bold tracking-widest text-[#D4AF37]">T | H | A <span class="text-white text-sm font-normal block tracking-normal">Smart Scanner</span></h1>
        <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center bg-white/10 rounded-full hover:bg-white/20">✕</button>
    </div>

    <div class="flex-grow relative flex items-center justify-center bg-black">
        <div id="reader" class="w-full h-full object-cover"></div>
        <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
            <div class="w-64 h-64 border-2 border-[#D4AF37]/50 rounded-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-[#D4AF37] rounded-tl-xl"></div>
                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-[#D4AF37] rounded-tr-xl"></div>
                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-[#D4AF37] rounded-bl-xl"></div>
                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-[#D4AF37] rounded-br-xl"></div>
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="bg-[#06245C] p-6 text-center z-20 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
        <p class="text-gray-300 text-sm mb-4">หันกล้องไปที่ป้าย QR Code เพื่อสแกนอัตโนมัติ</p>
        <div class="text-xs text-gray-500 font-mono" id="debug-info">รอการสแกน...</div>
    </div>

    <script>
        // เสียง Beep อัตโนมัติ
        const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        
        // อ่านค่า URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const targetPage = urlParams.get('page') || 'maintenance';
        const callbackUrl = urlParams.get('callback');

        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // 1. เล่นเสียง + สั่น
                    beep.pause(); beep.currentTime = 0; beep.play().catch(e=>e);
                    if (navigator.vibrate) navigator.vibrate(200);
                    
                    document.getElementById('debug-info').innerText = "สแกนสำเร็จ: " + decodedText;
                    html5QrCode.stop();

                    // 2. ส่งรหัสกลับไปที่ Google Sites / GAS
                    let scannedId = decodedText;
                    if(decodedText.includes('id=')) {
                        try { scannedId = new URL(decodedText).searchParams.get('id'); } catch(e){}
                    }

                    if (callbackUrl) {
                        // เด้งกลับไปที่แอปพร้อมรหัส (Magic Scan)
                        window.location.href = `${callbackUrl}?page=${targetPage}&id=${scannedId}`;
                    } else {
                        alert("รหัส: " + scannedId + "\n(ไม่พบลิงก์ส่งกลับ)");
                    }
                },
                (err) => { /* Ignore errors during scan focus */ }
            ).catch(err => {
                document.getElementById('debug-info').innerText = "ข้อผิดพลาดกล้อง: " + err;
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้องในเบราว์เซอร์");
            });
        }

        function goBack() {
            if (callbackUrl) { window.location.href = callbackUrl; } else { window.history.back(); }
        }

        // เริ่มกล้องทันทีที่โหลดเสร็จ
        window.onload = startScanner;
    </script>
</body>
</html>
