<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T|H|A Asset Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #051430; margin: 0; padding: 0; }
        
        /* 🌟 เส้นสแกนวิ่งขึ้นลง (สีฟ้านีออน) */
        .scan-line { width: 100%; height: 2px; background: #00e5ff; position: absolute; top: 0; left: 0; box-shadow: 0 0 15px 2px #00e5ff; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        
        /* 🌟 เอฟเฟกต์มุมกรอบ Sci-Fi (แสงฟุ้ง + กระพริบถี่ๆ) */
        .neon-corner {
            border-color: #00e5ff;
            filter: drop-shadow(0 0 5px #00e5ff);
            /* 🚀 ความเร็วการกระพริบเร็วทันใจ 0.6s */
            animation: pulse-glow 0.6s infinite alternate; 
        }
        @keyframes pulse-glow {
            0% { opacity: 1; filter: drop-shadow(0 0 8px #00e5ff) drop-shadow(0 0 15px #00e5ff); }
            100% { opacity: 0.3; filter: drop-shadow(0 0 2px #00e5ff); }
        }

        /* 🚀 กำจัดขอบมุมสีขาวดั้งเดิมของไลบรารีทิ้งไป 100% */
        #reader svg { display: none !important; }
        #reader { border: none !important; outline: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-white">

    <div class="bg-[#051430] p-4 text-center shadow-[0_4px_15px_rgba(0,229,255,0.2)] z-20 flex justify-between items-center relative border-b border-[#00e5ff]/30">
        <div class="w-8"></div>
        <h1 class="text-xl font-bold tracking-widest text-[#00e5ff] drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">T | H | A <span class="text-white text-sm font-normal block tracking-normal drop-shadow-none">Smart Scanner</span></h1>
        <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center bg-[#00e5ff]/10 text-[#00e5ff] rounded-full hover:bg-[#00e5ff]/30 border border-[#00e5ff]/50 transition-all">✕</button>
    </div>

    <div class="flex-grow relative flex items-center justify-center bg-black">
        <div id="reader" class="w-full h-full object-cover"></div>
        
        <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
            <div class="w-64 h-64 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-12 h-12 border-t-[6px] border-l-[6px] neon-corner rounded-tl-2xl"></div>
                <div class="absolute top-0 right-0 w-12 h-12 border-t-[6px] border-r-[6px] neon-corner rounded-tr-2xl"></div>
                <div class="absolute bottom-0 left-0 w-12 h-12 border-b-[6px] border-l-[6px] neon-corner rounded-bl-2xl"></div>
                <div class="absolute bottom-0 right-0 w-12 h-12 border-b-[6px] border-r-[6px] neon-corner rounded-br-2xl"></div>
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="bg-[#06245C] p-6 text-center z-20 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
        <p class="text-gray-300 text-sm mb-4">หันกล้องไปที่ป้าย QR Code หรือกดปุ่มด้านล่างเพื่อเลือกรูป</p>
        
        <label class="w-full bg-[#00e5ff]/10 text-[#00e5ff] border-2 border-[#00e5ff] border-dashed rounded-xl p-4 text-center font-bold cursor-pointer hover:bg-[#00e5ff]/20 hover:scale-[1.02] transition-all shadow-[0_0_10px_rgba(0,229,255,0.3)] flex items-center justify-center gap-3">
          <span class="text-3xl">🖼️</span>
          <span>เลือกรูปภาพ QR / ถ่ายรูป</span>
          <input type="file" id="qr-upload" class="hidden" accept="image/*" onchange="scanQRFromFile(event)">
        </label>
        
        <div class="text-xs text-gray-500 font-mono mt-4" id="debug-info">รอการสแกน...</div>
    </div>

    <script>
        const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        const SECRET_KEY = "N1u3@THA-SAM_K07e03y2026"; // ⚠️ รหัสลับตัวจริง

        let html5QrCode;

        // ฟังก์ชันเริ่มกล้อง
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 250, height: 250 } },
                (decodedText) => { handleScannedData(decodedText, false); }, // สแกนจากกล้องสำเร็จ
                (err) => { /* Ignore errors during focus */ }
            ).catch(err => {
                document.getElementById('debug-info').innerText = "ข้อผิดพลาดกล้อง: " + err;
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง");
            });
        }

        // 🌟 [สมองกลชุดใหม่] จัดการข้อมูลรหัสที่ได้ (Unified Handler)
        function handleScannedData(decodedText, isFromFile) {
            // 1. เสียง + สั่น
            beep.pause(); beep.currentTime = 0; beep.play().catch(e=>e);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // 🚀 ปิดกล้องทันทีถ้าเปิดอยู่
            if (html5QrCode && html5QrCode.isScanning) {
              html5QrCode.stop().catch(() => {});
            }

            // 2. ดึงรหัส
            let scannedId = decodedText;
            if(decodedText.includes('id=')) {
                try { scannedId = new URL(decodedText).searchParams.get('id'); } catch(e){}
            }

            // 3. ท่าไม้ตาย (ส่งกระแสจิต): ส่งข้อมูลกลับพร้อม ⚠️ รหัสลับ!
            if (window.opener) {
                
                window.opener.postMessage({ 
                    type: 'QR_SCANNED', 
                    id: scannedId,
                    key: SECRET_KEY // แนบรหัสลับไปด้วย
                }, "*");
                
                // เปลี่ยนหน้าจอเป็นแจ้งเตือนนีออน
                document.getElementById('debug-info').innerHTML = `
                    <div class="text-[#00e5ff] text-xl font-bold mb-2">✅ ${isFromFile ? 'อ่านไฟล์' : 'สแกน'}สำเร็จ!</div>
                    <p class="text-white text-lg">รหัส: ${scannedId}</p>
                    <p class="text-[#D4AF37] text-sm mt-4 animate-pulse">กำลังกลับไปที่หน้าแอป...</p>
                `;
                
                setTimeout(() => { window.close(); }, 1500); // สั่งปิดแท็บทิ้ง
            } else {
                // กรณีไม่ได้เปิดจากแอป
                document.getElementById('debug-info').innerText = `✅สำเร็จ!\nรหัส: ${scannedId}\n(กลับไปหน้าแอปเพื่อพิมพ์รหัสเอง)`;
            }
        }

        // 🌟 [ฟังก์ชันใหม่] สแกน QR Code จากไฟล์รูปภาพ
        function scanQRFromFile(event) {
          if (event.target.files.length == 0) return;
          const imageFile = event.target.files[0];
          
          // เคลียร์จอกล้องก่อน
          document.getElementById('qr-upload').innerText = "กำลังอ่านไฟล์...";

          // จัดการ Instance ของ Library
          if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
          
          // สั่งสแกนจากไฟล์
          html5QrCode.scanFile(imageFile, true)
            .then(decodedText => { handleScannedData(decodedText, true); }) // อ่านรูปสำเร็จ
            .catch(err => {
              beep.play().catch(e=>e); // เสียงเตือนว่าอ่านไม่เจอ
              alert("อ่าน QR Code ไม่สำเร็จ: ไม่พบรหัสในรูปภาพ หรือรูปภาพไม่ชัด กรุณาลองใหม่ค่ะ");
              document.getElementById('debug-info').innerText = "อ่านรูปไม่สำเร็จ: ไม่พบ QR";
            });
          
          event.target.value = ''; // เคลียร์ Input เผื่อเลือกรูปเดิมซ้ำ
        }

        // ปุ่ม X ปิดแท็บ
        function goBack() {
            if (window.opener) { window.close(); } else { window.history.back(); }
        }

        window.onload = startScanner;
    </script>
</body>
</html>
